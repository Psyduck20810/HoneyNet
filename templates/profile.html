<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attacker Profile</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0c10; --surface:#111318; --border:#1e2229;
  --text:#c8d0e0; --dim:#4a5568; --orange:#ff6600;
  --red:#ff3b6e; --green:#00e599; --blue:#2a5cff;
  --purple:#a78bfa;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.logo { color:var(--orange); font-weight:700; font-size:16px; }
.nav a { padding:6px 14px; border-radius:4px; font-size:12px; text-decoration:none; color:var(--dim); font-family:var(--mono); transition:all 0.2s; }
.nav a:hover { color:var(--orange); background:rgba(255,102,0,0.08); }
.back-btn { display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px solid var(--border); color:var(--dim); padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; font-family:var(--mono); text-decoration:none; transition:all 0.2s; }
.back-btn:hover { border-color:var(--orange); color:var(--orange); }

/* MAIN */
.main { max-width:1200px; margin:0 auto; padding:28px 24px; }

/* HERO CARD */
.hero { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px; margin-bottom:24px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--red), var(--orange), var(--blue)); }
.hero-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
.hero-ip { font-family:var(--mono); font-size:32px; font-weight:700; color:var(--red); margin-bottom:6px; }
.hero-location { font-size:14px; color:var(--dim); margin-bottom:12px; }
.hero-tags { display:flex; gap:8px; flex-wrap:wrap; }
.tag { padding:4px 12px; border-radius:4px; font-size:11px; font-family:var(--mono); font-weight:700; border:1px solid; }
.tag.red    { background:rgba(255,59,110,0.1);  color:var(--red);    border-color:rgba(255,59,110,0.3); }
.tag.orange { background:rgba(255,102,0,0.1);   color:var(--orange); border-color:rgba(255,102,0,0.3); }
.tag.green  { background:rgba(0,229,153,0.1);   color:var(--green);  border-color:rgba(0,229,153,0.3); }
.tag.blue   { background:rgba(42,92,255,0.1);   color:var(--blue);   border-color:rgba(42,92,255,0.3); }
.tag.purple { background:rgba(167,139,250,0.1); color:var(--purple); border-color:rgba(167,139,250,0.3); }

/* THREAT SCORE CIRCLE */
.threat-circle { width:100px; height:100px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; border:4px solid; flex-shrink:0; }
.threat-score-num { font-size:28px; font-weight:700; font-family:var(--mono); line-height:1; }
.threat-score-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; margin-top:2px; }

/* STATS ROW */
.stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
.stat-box { text-align:center; }
.stat-box-val { font-size:24px; font-weight:700; font-family:var(--mono); }
.stat-box-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; font-family:var(--mono); }

/* GRID LAYOUT */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:20px; }

/* PANEL */
.panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.panel-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.panel-title { font-size:11px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:0.08em; font-family:var(--mono); }
.panel-body { padding:16px 20px; }

/* TIMELINE */
.timeline { position:relative; padding-left:20px; }
.timeline::before { content:''; position:absolute; left:6px; top:0; bottom:0; width:1px; background:var(--border); }
.event { position:relative; margin-bottom:8px; }
.event-dot { position:absolute; left:-17px; top:12px; width:8px; height:8px; border-radius:50%; border:2px solid var(--bg); }
.event-dot.HIGH   { background:var(--red);    box-shadow:0 0 6px var(--red); }
.event-dot.MEDIUM { background:#ff8c42;        box-shadow:0 0 6px #ff8c42; }
.event-dot.LOW    { background:var(--green); }
.event-dot.Normal { background:var(--dim); }
.event-card { background:#0d1017; border:1px solid var(--border); border-radius:6px; padding:10px 14px; transition:all 0.2s; }
.event-card:hover { border-color:#2a3a55; }
.event-card.HIGH   { border-left:2px solid var(--red); }
.event-card.MEDIUM { border-left:2px solid #ff8c42; }
.event-card.LOW    { border-left:2px solid var(--green); }
.event-top { display:flex; justify-content:space-between; margin-bottom:4px; }
.event-type { font-size:12px; font-weight:700; color:#e2e8f0; }
.event-time { font-size:10px; color:var(--dim); font-family:var(--mono); }
.event-endpoint { font-family:var(--mono); font-size:11px; color:var(--blue); margin-bottom:3px; }
.event-payload { font-family:var(--mono); font-size:10px; color:#ff6600aa; background:rgba(255,102,0,0.05); padding:3px 8px; border-radius:3px; margin-top:4px; word-break:break-all; }

/* SSH COMMANDS */
.ssh-cmd { background:#0d1017; border:1px solid var(--border); border-radius:4px; padding:8px 14px; margin-bottom:6px; font-family:var(--mono); font-size:12px; display:flex; gap:10px; align-items:flex-start; }
.ssh-prompt { color:var(--green); flex-shrink:0; }
.ssh-text { color:#e2e8f0; word-break:break-all; }

/* THREAT FLAGS */
.flag-item { padding:8px 12px; border-radius:5px; font-size:12px; margin-bottom:6px; border:1px solid; }
.flag-item.danger  { background:rgba(255,59,110,0.06); border-color:rgba(255,59,110,0.2); color:#ff8080; }
.flag-item.warning { background:rgba(255,140,66,0.06); border-color:rgba(255,140,66,0.2); color:#ffaa60; }
.flag-item.clean   { background:rgba(0,229,153,0.06);  border-color:rgba(0,229,153,0.2);  color:#00c880; }
.flag-item.info    { background:rgba(42,92,255,0.06);  border-color:rgba(42,92,255,0.2);  color:#6090ff; }

/* DOWNLOADS */
.download-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:#0d1017; border:1px solid var(--border); border-radius:6px; margin-bottom:6px; }
.download-icon { font-size:20px; }
.download-name { font-family:var(--mono); font-size:12px; color:var(--orange); }
.download-time { font-size:10px; color:var(--dim); font-family:var(--mono); margin-top:2px; }

/* LOADING */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; gap:12px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn 0.4s ease; }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:#1e2229; border-radius:2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">✈ Thomas Cook — Attacker Profile</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="nav">
      <a href="/dashboard">📊 Dashboard</a>
      <a href="/sessions">🎬 Sessions</a>
      <a href="/threat">🔍 Threat Intel</a>
      <a href="/map">🗺️ Map</a>
    </div>
    <a href="/sessions" class="back-btn">← Back to Sessions</a>
  </div>
</div>

<div class="main" id="main">
  <div class="loading">
    <div class="spinner"></div>
    <div style="color:var(--dim);font-family:var(--mono);font-size:12px;">Loading attacker profile...</div>
  </div>
</div>

<script>
const ip = decodeURIComponent(window.location.pathname.split('/profile/')[1]);

const attackIcons = {
  "SQL Injection":"💉", "XSS":"⚡", "Command Injection":"💻",
  "Path Traversal":"📂", "Brute Force":"🔑", "Reconnaissance":"🔍",
  "SSH Brute Force":"🔌", "SSH Command Execution":"💻",
  "MongoDB Probe":"🗄️", "MongoDB List Databases":"🗄️",
  "Phishing Email":"📧", "Spam Email":"📧", "Normal":"👤",
};

const htypeColors = { WEB:"#ff6600", SSH:"#ff3b6e", DATABASE:"#00e599", EMAIL:"#a78bfa" };
const htypeIcons  = { WEB:"🌐", SSH:"🔌", DATABASE:"🗄️", EMAIL:"📧" };

function getIcon(type) { return attackIcons[type] || "🎯"; }

function formatTime(ts) {
  if (!ts) return "?";
  return ts.substring(0,10) + " " + ts.substring(11,19);
}

function calcDuration(first, last) {
  if (!first || !last) return "?";
  try {
    const diff = new Date(last) - new Date(first);
    const secs = Math.floor(diff/1000);
    if (secs < 60)   return secs + "s";
    if (secs < 3600) return Math.floor(secs/60) + "m " + (secs%60) + "s";
    return Math.floor(secs/3600) + "h " + Math.floor((secs%3600)/60) + "m";
  } catch(e) { return "?"; }
}

function threatColor(level) {
  return {CRITICAL:"#ff3b6e",HIGH:"#ff3b6e",MEDIUM:"#ff8c42",LOW:"#ff6600",CLEAN:"#00e599",UNKNOWN:"#4a5568"}[level] || "#4a5568";
}

async function loadProfile() {
  try {
    const res  = await fetch('/api/profile/' + encodeURIComponent(ip));
    const data = await res.json();

    if (data.error) {
      document.getElementById('main').innerHTML =
        `<div style="text-align:center;padding:40px;color:var(--red);">❌ ${data.error}</div>`;
      return;
    }

    const s = data.session;
    const t = data.threat || {};

    const highCount    = s.events.filter(e => e.risk_level === "HIGH").length;
    const sshEvents    = s.events.filter(e => e.attack_type && e.attack_type.includes("SSH"));
    const dbEvents     = s.events.filter(e => e.attack_type && e.attack_type.includes("MongoDB"));
    const emailEvents  = s.events.filter(e => e.attack_type && (e.attack_type.includes("Email") || e.attack_type.includes("Phishing")));
    const downloadEvents = s.events.filter(e => e.endpoint && (e.endpoint.includes("backup") || e.endpoint.includes("download")));
    const sshCmds      = s.events.filter(e => e.attack_type === "SSH Command Execution");
    const uniquePages  = [...new Set(s.events.map(e => e.endpoint))];
    const duration     = calcDuration(s.first_seen, s.last_seen);

    const tColor = threatColor(t.threat_level);
    const riskColor = s.overall_risk === "HIGH" ? "var(--red)" : s.overall_risk === "MEDIUM" ? "#ff8c42" : "var(--green)";

    // ── Determine attacker type ───────────────────────
    let attackerType = "Unknown Attacker";
    let attackerDesc = "";
    if (sshEvents.length > 0 && highCount > 3) {
      attackerType = "Advanced Persistent Threat";
      attackerDesc = "This attacker used multiple attack vectors including SSH brute force and web attacks.";
    } else if (sshEvents.length > 0) {
      attackerType = "SSH Brute Force Bot";
      attackerDesc = "Automated tool attempting to gain SSH access using credential stuffing.";
    } else if (s.events.some(e => e.attack_type === "SQL Injection")) {
      attackerType = "Web Application Attacker";
      attackerDesc = "Targeting web application vulnerabilities including SQL injection and XSS.";
    } else if (s.events.some(e => e.attack_type === "Reconnaissance")) {
      attackerType = "Reconnaissance Scanner";
      attackerDesc = "Systematically scanning for exposed endpoints and sensitive files.";
    } else if (dbEvents.length > 0) {
      attackerType = "Database Harvester";
      attackerDesc = "Targeting exposed database ports attempting to dump sensitive data.";
    } else {
      attackerType = "Unknown Attacker";
      attackerDesc = "Attack pattern does not match known profiles.";
    }

    document.getElementById('main').innerHTML = `
    <div class="fade-in">

      <!-- HERO -->
      <div class="hero">
        <div class="hero-top">
          <div>
            <div class="hero-ip">🎯 ${s.ip}</div>
            <div class="hero-location">📍 ${s.city}, ${s.country} &nbsp;·&nbsp; 🏢 ${s.isp}</div>
            <div class="hero-tags">
              <span class="tag red">${s.overall_risk} RISK</span>
              <span class="tag orange">${attackerType}</span>
              <span class="tag blue">🌐 ${s.browser}</span>
              <span class="tag blue">🖥 ${s.os}</span>
              ${t.is_tor    ? '<span class="tag red">🧅 TOR NODE</span>'      : ''}
              ${t.is_proxy  ? '<span class="tag orange">⚠️ PROXY/VPN</span>'  : ''}
              ${sshEvents.length   > 0 ? '<span class="tag red">🔌 SSH ATTACKER</span>'  : ''}
              ${dbEvents.length    > 0 ? '<span class="tag green">🗄️ DB SCANNER</span>' : ''}
              ${downloadEvents.length > 0 ? '<span class="tag purple">📥 DOWNLOADED DECOY</span>' : ''}
            </div>
            <div style="margin-top:12px;font-size:12px;color:var(--dim);max-width:500px;">${attackerDesc}</div>
          </div>
          <div style="text-align:center;">
            <div class="threat-circle" style="border-color:${tColor};">
              <span class="threat-score-num" style="color:${tColor};">${t.threat_score || 0}</span>
              <span class="threat-score-lbl">THREAT</span>
            </div>
            <div style="font-size:11px;color:${tColor};font-family:var(--mono);font-weight:700;margin-top:6px;">${t.threat_level || "UNKNOWN"}</div>
            <a href="/threat#${s.ip}" onclick="localStorage.setItem('checkIP','${s.ip}')" style="font-size:10px;color:var(--blue);font-family:var(--mono);text-decoration:none;display:block;margin-top:4px;">Full Intel →</a>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-box-val">${s.total_events}</div>
            <div class="stat-box-lbl">Total Events</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-val" style="color:var(--red);">${highCount}</div>
            <div class="stat-box-lbl">High Risk</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-val" style="color:var(--orange);">${uniquePages.length}</div>
            <div class="stat-box-lbl">Pages Visited</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-val" style="color:var(--blue);">${sshCmds.length}</div>
            <div class="stat-box-lbl">SSH Commands</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-val">${duration}</div>
            <div class="stat-box-lbl">Duration</div>
          </div>
        </div>
      </div>

      <!-- ROW 1: Timeline + Threat Intel -->
      <div class="grid2">

        <!-- ATTACK TIMELINE -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">⏱ Full Attack Timeline</span>
            <span style="font-size:10px;color:var(--dim);font-family:var(--mono);">${s.total_events} events</span>
          </div>
          <div class="panel-body" style="max-height:400px;overflow-y:auto;">
            <div class="timeline">
              ${s.events.map((e,i) => `
                <div class="event" style="opacity:0;transform:translateX(-8px);transition:all 0.3s ease ${i*0.05}s;" id="ev-${i}">
                  <div class="event-dot ${e.risk_level}"></div>
                  <div class="event-card ${e.risk_level}">
                    <div class="event-top">
                      <span class="event-type">${getIcon(e.attack_type)} ${e.attack_type}</span>
                      <span class="event-time">${formatTime(e.timestamp)}</span>
                    </div>
                    <div class="event-endpoint">${e.endpoint}</div>
                    ${e.payload ? `<div class="event-payload">${e.payload.substring(0,80)}</div>` : ''}
                  </div>
                </div>`).join('')}
            </div>
          </div>
        </div>

        <!-- THREAT INTEL -->
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">🔍 Threat Intelligence</span>
              <span style="font-size:10px;color:${tColor};font-family:var(--mono);font-weight:700;">${t.threat_level||'CHECKING...'}</span>
            </div>
            <div class="panel-body">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
                <div style="background:#0d1017;border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;">
                  <div style="font-size:20px;font-weight:700;font-family:var(--mono);color:${tColor};">${t.threat_score||0}</div>
                  <div style="font-size:9px;color:var(--dim);text-transform:uppercase;">Threat Score</div>
                </div>
                <div style="background:#0d1017;border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;">
                  <div style="font-size:20px;font-weight:700;font-family:var(--mono);color:var(--orange);">${t.databases_found||0}</div>
                  <div style="font-size:9px;color:var(--dim);text-transform:uppercase;">DB Hits</div>
                </div>
              </div>
              <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
                <span style="padding:4px 10px;border-radius:4px;font-size:11px;font-family:var(--mono);background:rgba(255,59,110,0.1);color:${t.is_tor?'var(--red)':'var(--dim)'};border:1px solid rgba(255,59,110,0.2);">
                  🧅 Tor: ${t.is_tor ? 'YES ⚠️' : 'No'}
                </span>
                <span style="padding:4px 10px;border-radius:4px;font-size:11px;font-family:var(--mono);background:rgba(255,140,66,0.1);color:${t.is_proxy?'#ff8c42':'var(--dim)'};border:1px solid rgba(255,140,66,0.2);">
                  🔒 Proxy: ${t.is_proxy ? 'YES ⚠️' : 'No'}
                </span>
              </div>
              <div style="font-size:10px;color:var(--dim);font-family:var(--mono);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em;">Threat Flags</div>
              ${(t.flags||[]).map(f => {
                let cls = 'info';
                if (f.includes('🔴')||f.includes('🚨')||f.includes('🧅')) cls='danger';
                else if (f.includes('⚠️')||f.includes('🖥️')) cls='warning';
                else if (f.includes('✅')) cls='clean';
                return `<div class="flag-item ${cls}">${f}</div>`;
              }).join('')}
            </div>
          </div>

          <!-- DEVICE INFO -->
          <div class="panel">
            <div class="panel-header"><span class="panel-title">🖥 Device Information</span></div>
            <div class="panel-body">
              ${[
                ['IP Address', s.ip, 'var(--blue)'],
                ['Country', s.country, 'var(--text)'],
                ['City', s.city, 'var(--text)'],
                ['ISP', s.isp, 'var(--text)'],
                ['Browser', s.browser, 'var(--orange)'],
                ['OS', s.os, 'var(--orange)'],
                ['First Seen', formatTime(s.first_seen), 'var(--dim)'],
                ['Last Seen', formatTime(s.last_seen), 'var(--dim)'],
              ].map(([label, val, color]) => `
                <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
                  <span style="color:var(--dim);">${label}</span>
                  <span style="color:${color};font-family:var(--mono);">${val||'?'}</span>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <!-- ROW 2: SSH Commands + Downloads + Pages -->
      <div class="grid3">

        <!-- SSH COMMANDS -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">🔌 SSH Commands Typed</span>
            <span style="font-size:10px;color:var(--red);font-family:var(--mono);">${sshCmds.length} commands</span>
          </div>
          <div class="panel-body" style="max-height:250px;overflow-y:auto;">
            ${sshCmds.length > 0
              ? sshCmds.map(e => `
                  <div class="ssh-cmd">
                    <span class="ssh-prompt">tc-prod:~$</span>
                    <span class="ssh-text">${e.payload.replace('SSH command: ','')}</span>
                  </div>`).join('')
              : '<div style="text-align:center;color:var(--dim);font-size:12px;padding:20px;font-family:var(--mono);">No SSH commands recorded</div>'
            }
          </div>
        </div>

        <!-- DECOY DOWNLOADS -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📥 Decoy Files Downloaded</span>
            <span style="font-size:10px;color:var(--purple);font-family:var(--mono);">${downloadEvents.length} downloads</span>
          </div>
          <div class="panel-body">
            ${downloadEvents.length > 0
              ? downloadEvents.map(e => `
                  <div class="download-item">
                    <span class="download-icon">📦</span>
                    <div>
                      <div class="download-name">${e.endpoint}</div>
                      <div class="download-time">${formatTime(e.timestamp)}</div>
                    </div>
                    <span style="margin-left:auto;font-size:10px;color:var(--red);font-family:var(--mono);font-weight:700;">HIGH</span>
                  </div>`).join('')
              : '<div style="text-align:center;color:var(--dim);font-size:12px;padding:20px;font-family:var(--mono);">No decoy downloads</div>'
            }
            ${downloadEvents.length > 0 ? `
              <div style="margin-top:12px;padding:10px;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.2);border-radius:6px;font-size:11px;color:var(--purple);">
                ⚠️ Attacker received fake employee data, database credentials and API keys
              </div>` : ''}
          </div>
        </div>

        <!-- PAGES VISITED -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">🗺️ Pages Visited</span>
            <span style="font-size:10px;color:var(--orange);font-family:var(--mono);">${uniquePages.length} unique</span>
          </div>
          <div class="panel-body" style="max-height:250px;overflow-y:auto;">
            ${uniquePages.map(page => {
              const count = s.events.filter(e => e.endpoint === page).length;
              return `
                <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;">
                  <span style="font-family:var(--mono);color:var(--blue);">${page}</span>
                  <span style="font-family:var(--mono);color:var(--orange);font-size:11px;">${count}x</span>
                </div>`;
            }).join('')}
          </div>
        </div>

      </div>

      <!-- ROW 3: Attack type breakdown -->
      <div class="panel" style="margin-bottom:20px;">
        <div class="panel-header"><span class="panel-title">📊 Attack Type Breakdown</span></div>
        <div class="panel-body">
          <div style="display:flex;flex-wrap:wrap;gap:10px;">
            ${Object.entries(
                s.events.reduce((acc,e) => {
                  acc[e.attack_type] = (acc[e.attack_type]||0)+1;
                  return acc;
                }, {})
              ).sort((a,b)=>b[1]-a[1]).map(([type,count]) => `
                <div style="background:#0d1017;border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;min-width:100px;">
                  <div style="font-size:20px;margin-bottom:4px;">${getIcon(type)}</div>
                  <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:#e2e8f0;">${count}</div>
                  <div style="font-size:10px;color:var(--dim);margin-top:2px;">${type}</div>
                </div>`).join('')}
          </div>
        </div>
      </div>

    </div>`;

    // Animate timeline events
    setTimeout(() => {
      s.events.forEach((_,i) => {
        setTimeout(() => {
          const el = document.getElementById('ev-' + i);
          if (el) { el.style.opacity='1'; el.style.transform='translateX(0)'; }
        }, i * 50);
      });
    }, 200);

  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div style="text-align:center;padding:40px;color:var(--red);">❌ Error loading profile: ${e.message}</div>`;
  }
}

loadProfile();
</script>
</body>
</html>
