<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas Cook — Attacker Session Replay</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0c10; --surface:#111318; --border:#1e2229;
  --text:#c8d0e0; --dim:#4a5568; --orange:#ff6600;
  --red:#ff3b6e; --green:#00e599; --blue:#2a5cff;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.logo { color:var(--orange); font-weight:700; font-size:16px; }
.nav { display:flex; gap:4px; }
.nav a { padding:6px 14px; border-radius:4px; font-size:12px; text-decoration:none; color:var(--dim); font-family:var(--mono); transition:all 0.2s; }
.nav a:hover,.nav a.active { color:var(--orange); background:rgba(255,102,0,0.08); }

/* LAYOUT */
.layout { display:grid; grid-template-columns:360px 1fr; height:calc(100vh - 53px); }

/* LEFT — IP LIST */
.ip-list { border-right:1px solid var(--border); overflow-y:auto; background:var(--surface); }
.ip-list-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.ip-list-title { font-size:12px; font-weight:700; color:#e2e8f0; text-transform:uppercase; letter-spacing:0.08em; font-family:var(--mono); }
.ip-count { font-size:11px; color:var(--dim); font-family:var(--mono); }

.ip-card { padding:14px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:all 0.15s; position:relative; }
.ip-card:hover { background:rgba(255,102,0,0.04); }
.ip-card.active { background:rgba(255,102,0,0.08); border-left:2px solid var(--orange); }
.ip-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.ip-addr { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--blue); }
.risk-badge { padding:2px 8px; border-radius:3px; font-size:9px; font-weight:700; font-family:var(--mono); }
.risk-badge.HIGH   { background:rgba(255,59,110,0.15); color:var(--red); border:1px solid rgba(255,59,110,0.3); }
.risk-badge.MEDIUM { background:rgba(255,140,66,0.15); color:#ff8c42;   border:1px solid rgba(255,140,66,0.3); }
.risk-badge.LOW    { background:rgba(0,229,153,0.1);   color:var(--green);border:1px solid rgba(0,229,153,0.2); }
.ip-location { font-size:11px; color:var(--dim); margin-bottom:4px; }
.ip-meta { display:flex; gap:12px; font-size:10px; color:#2a3a55; font-family:var(--mono); }
.ip-events { color:var(--orange); }

/* RIGHT — SESSION REPLAY */
.session-view { overflow-y:auto; padding:24px; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--dim); gap:12px; }
.empty-icon { font-size:48px; }
.empty-text { font-size:14px; font-family:var(--mono); }

/* SESSION HEADER */
.session-header { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin-bottom:20px; }
.session-header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.attacker-ip { font-family:var(--mono); font-size:22px; font-weight:700; color:var(--red); }
.attacker-location { font-size:13px; color:var(--dim); margin-top:4px; }
.session-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
.session-stat { text-align:center; }
.session-stat-val { font-size:20px; font-weight:700; font-family:var(--mono); color:#e2e8f0; }
.session-stat-val.red { color:var(--red); }
.session-stat-val.orange { color:var(--orange); }
.session-stat-lbl { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:0.06em; margin-top:3px; font-family:var(--mono); }
.device-info { display:flex; gap:16px; flex-wrap:wrap; }
.device-tag { background:#0d1017; border:1px solid var(--border); border-radius:4px; padding:4px 10px; font-size:11px; color:var(--dim); font-family:var(--mono); }

/* TIMELINE */
.timeline-title { font-size:11px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:14px; font-family:var(--mono); }
.timeline { position:relative; padding-left:24px; }
.timeline::before { content:''; position:absolute; left:7px; top:0; bottom:0; width:1px; background:var(--border); }

.event { position:relative; margin-bottom:10px; }
.event-dot { position:absolute; left:-21px; top:14px; width:10px; height:10px; border-radius:50%; border:2px solid var(--bg); }
.event-dot.HIGH   { background:var(--red);    box-shadow:0 0 8px var(--red); }
.event-dot.MEDIUM { background:#ff8c42;        box-shadow:0 0 8px #ff8c42; }
.event-dot.LOW    { background:var(--green);   box-shadow:0 0 6px var(--green); }
.event-dot.Normal { background:var(--dim); }

.event-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:12px 16px; transition:all 0.2s; }
.event-card:hover { border-color:#2a3a55; background:#0d1017; }
.event-card.HIGH   { border-left:2px solid var(--red); }
.event-card.MEDIUM { border-left:2px solid #ff8c42; }
.event-card.LOW    { border-left:2px solid var(--green); }
.event-card.Normal { border-left:2px solid var(--border); }

.event-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.event-type { font-size:12px; font-weight:700; color:#e2e8f0; }
.event-time { font-size:10px; color:var(--dim); font-family:var(--mono); }
.event-endpoint { font-family:var(--mono); font-size:11px; color:var(--blue); margin-bottom:4px; }
.event-payload { font-family:var(--mono); font-size:10px; color:#2a3a55; background:#0d1017; padding:4px 8px; border-radius:3px; margin-top:6px; word-break:break-all; }
.event-payload.danger { color:#ff6600aa; }

/* REPLAY BUTTON */
.replay-btn { display:inline-flex; align-items:center; gap:8px; background:var(--orange); color:white; border:none; padding:8px 20px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--mono); transition:all 0.2s; }
.replay-btn:hover { background:#e55a00; transform:translateY(-1px); }

/* ATTACK ICONS */
.attack-icon { margin-right:6px; }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:#1e2229; border-radius:2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">✈ Thomas Cook — Attacker Sessions</div>
  <div class="nav">
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/sessions" class="active">🎬 Session Replay</a>
    <a href="/map">🗺️ Attack Map</a>
    <a href="/">🎯 Honeypot</a>
  </div>
</div>

<div class="layout">

  <!-- LEFT: IP LIST -->
  <div class="ip-list">
    <div class="ip-list-header">
      <span class="ip-list-title">Attacker IPs</span>
      <span class="ip-count" id="ip-count">Loading...</span>
    </div>
    <div id="ip-cards"></div>
  </div>

  <!-- RIGHT: SESSION REPLAY -->
  <div class="session-view" id="session-view">
    <div class="empty-state">
      <div class="empty-icon">🎬</div>
      <div class="empty-text">Select an attacker IP to replay their session</div>
      <div style="font-size:11px;color:#2a3a55;font-family:var(--mono);">Shows every action they took step by step</div>
    </div>
  </div>

</div>

<script>
let sessions = [];

const attackIcons = {
  "SQL Injection":     "💉",
  "XSS":              "⚡",
  "Command Injection":"💻",
  "Path Traversal":   "📂",
  "Brute Force":      "🔑",
  "Reconnaissance":   "🔍",
  "Normal":           "👤",
};

function getIcon(type) {
  return attackIcons[type] || "🎯";
}

function formatTime(ts) {
  if (!ts) return "?";
  return ts.substring(11,19) + " UTC";
}

function formatDate(ts) {
  if (!ts) return "?";
  return ts.substring(0,10) + " " + ts.substring(11,16) + " UTC";
}

function calcDuration(first, last) {
  if (!first || !last) return "?";
  try {
    const diff = new Date(last) - new Date(first);
    const secs = Math.floor(diff / 1000);
    if (secs < 60)  return secs + "s";
    if (secs < 3600) return Math.floor(secs/60) + "m " + (secs%60) + "s";
    return Math.floor(secs/3600) + "h " + Math.floor((secs%3600)/60) + "m";
  } catch(e) { return "?"; }
}

// ── Load sessions ────────────────────────────────────────
function sanitize(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

async function loadSessions() {
  try {
    const res = await fetch('/api/sessions');
    sessions  = await res.json();

    document.getElementById('ip-count').textContent =
      sessions.length + " attackers";

    renderIPList();
  } catch(e) {
    console.error('Sessions error:', e);
  }
}

// ── Render IP list on left ───────────────────────────────
function renderIPList() {
  const container = document.getElementById('ip-cards');

  if (sessions.length === 0) {
    container.innerHTML = `
      <div style="padding:24px;text-align:center;color:var(--dim);font-size:12px;font-family:var(--mono);">
        No sessions yet.<br>Run a simulation first!
      </div>`;
    return;
  }

  container.innerHTML = sessions.map((s, idx) => `
    <div class="ip-card" id="ip-card-${idx}" onclick="showSession(${idx})">
      <div class="ip-card-top">
        <span class="ip-addr">${s.ip}</span>
        <span class="risk-badge ${s.overall_risk}">${s.overall_risk}</span>
      </div>
      <div class="ip-location">📍 ${s.city}, ${s.country}</div>
      <div class="ip-meta">
        <span class="ip-events">⚡ ${s.total_events} events</span>
        <span>🎯 ${s.top_attack}</span>
        <span>⏱ ${calcDuration(s.first_seen, s.last_seen)}</span>
      </div>
      <div style="margin-top:8px;">
        <a href="/profile/${s.ip}" onclick="event.stopPropagation()" style="font-size:10px;color:var(--orange);font-family:var(--mono);text-decoration:none;padding:3px 10px;border:1px solid rgba(255,102,0,0.3);border-radius:3px;display:inline-block;">👤 View Full Profile →</a>
      </div>
    </div>
  `).join('');
}

// ── Show session replay on right ─────────────────────────
function showSession(idx) {
  const s = sessions[idx];

  // Highlight active card
  document.querySelectorAll('.ip-card').forEach(c => c.classList.remove('active'));
  document.getElementById('ip-card-' + idx).classList.add('active');

  const highCount   = s.events.filter(e => e.risk_level === 'HIGH').length;
  const medCount    = s.events.filter(e => e.risk_level === 'MEDIUM').length;
  const duration    = calcDuration(s.first_seen, s.last_seen);
  const uniquePages = [...new Set(s.events.map(e => e.endpoint))].length;

  // Build timeline events
  const timeline = s.events.map((e, i) => {
    const icon    = getIcon(e.attack_type);
    const rawPayload = e.payload ? e.payload.substring(0,80) : '';
    const safePayload = sanitize(rawPayload);
    const safeAttack  = sanitize(e.attack_type);
    const safeEndpoint= sanitize(e.endpoint);
    const isDanger = e.risk_level === 'HIGH' || e.risk_level === 'MEDIUM';

    return `
      <div class="event" id="ev-${i}" style="opacity:0;transform:translateX(-10px);transition:all 0.3s ease ${i*0.08}s;">
        <div class="event-dot ${e.risk_level}"></div>
        <div class="event-card ${e.risk_level}">
          <div class="event-top">
            <span class="event-type">
              <span class="attack-icon">${icon}</span>
              ${e.attack_type}
            </span>
            <span class="event-time">${formatTime(e.timestamp)}</span>
          </div>
          <div class="event-endpoint">${e.endpoint}</div>
          ${e.username && e.username !== 'post-login-visitor' && e.username !== 'recon-scanner'
            ? `<div style="font-size:11px;color:var(--dim);margin-top:4px;">
                👤 Username: <span style="color:#ff8c42;">${sanitize(e.username)}</span>
               </div>` : ''}
          ${rawPayload
            ? `<div class="event-payload ${isDanger ? 'danger' : ''}">${safePayload}</div>`
            : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('session-view').innerHTML = `
    <!-- SESSION HEADER -->
    <div class="session-header">
      <div class="session-header-top">
        <div>
          <div class="attacker-ip">🎯 ${s.ip}</div>
          <div class="attacker-location">📍 ${s.city}, ${s.country} &nbsp;·&nbsp; 🏢 ${s.isp}</div>
          <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
            <span class="device-tag">🌐 ${s.browser}</span>
            <span class="device-tag">🖥 ${s.os}</span>
            <span class="device-tag">🕐 First: ${formatDate(s.first_seen)}</span>
            <span class="device-tag">🕐 Last: ${formatDate(s.last_seen)}</span>
          </div>
        </div>
        <span class="risk-badge ${s.overall_risk}" style="font-size:12px;padding:6px 14px;">
          ${s.overall_risk} RISK
        </span>
      </div>

      <div class="session-stats">
        <div class="session-stat">
          <div class="session-stat-val">${s.total_events}</div>
          <div class="session-stat-lbl">Total Actions</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val red">${highCount}</div>
          <div class="session-stat-lbl">High Risk</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val orange">${uniquePages}</div>
          <div class="session-stat-lbl">Pages Visited</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val">${duration}</div>
          <div class="session-stat-lbl">Duration</div>
        </div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="timeline-title">⏱ Attack Timeline — Step by Step</div>
    <div class="timeline" id="timeline">
      ${timeline}
    </div>
  `;

  // Animate events appearing one by one
  setTimeout(() => {
    s.events.forEach((e, i) => {
      setTimeout(() => {
        const el = document.getElementById('ev-' + i);
        if (el) {
          el.style.opacity   = '1';
          el.style.transform = 'translateX(0)';
        }
      }, i * 80);
    });
  }, 100);
}

// ── Add Sessions link to dashboard ──────────────────────
loadSessions();
setInterval(loadSessions, 15000);
</script>

</body>
</html>
