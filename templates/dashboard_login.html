<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Honeypot Dashboard — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --surface2:  #0d1017;
      --border:    #1e2229;
      --orange:    #ff6600;
      --red:       #ff3b6e;
      --green:     #00e599;
      --blue:      #2a5cff;
      --text:      #c8d0e0;
      --text-dim:  #4a5568;
      --mono:      'Courier New', monospace;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(42,92,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,92,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,102,0,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px 40px;
      width: 420px;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,102,0,0.1);
    }

    /* Top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--red), var(--blue));
      border-radius: 16px 16px 0 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--orange), var(--red));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.02em;
    }

    .logo-text p {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: var(--mono);
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      opacity: 0.5;
    }

    input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--mono);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,102,0,0.12);
    }

    input::placeholder { color: var(--text-dim); }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,59,110,0.1);
      border: 1px solid rgba(255,59,110,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--red);
      font-family: var(--mono);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--orange), #e55a00);
      color: white;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,102,0,0.35);
    }

    .btn:active { transform: translateY(0); }

    .footer-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,229,153,0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 5px rgba(0,229,153,0); }
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 0;
    }

    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 10px; color: var(--text-dim); font-family: var(--mono); white-space: nowrap; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">
      <h1>Honeypot Intelligence</h1>
      <p>Thomas Cook · Security Operations</p>
    </div>
  </div>

  <div class="title">Sign in</div>
  <div class="subtitle">Access the attack analytics dashboard</div>

  {% if error %}
  <div class="error-msg">
    <span>⚠</span> {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/dashboard-login">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input
          type="text"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          autofocus
          required
        />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input
          type="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>
    </div>

    <button type="submit" class="btn">→ Sign In to Dashboard</button>
  </form>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">SYSTEM STATUS</div>
    <div class="divider-line"></div>
  </div>

  <div class="footer-note">
    <div class="live-dot"></div>
    All honeypot services active · Monitoring 24/7
  </div>
</div>

</body>
</html>
